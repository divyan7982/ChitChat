<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <section class="chat__section">
        <div class="brand">
            <img height="40" src="/wassup.png" alt="">
            <h1>ChitChat</h1>
        </div>
        <div class="message__area"></div>
        <!-- Container for textarea and file upload button -->
        <div class="input-container">
            <textarea id="textarea" cols="30" rows="1" placeholder="Write a message..."></textarea>
            <!-- Button for uploading files -->
            <label for="fileInput" class="file-upload-btn">Upload File</label>
            <input type="file" id="fileInput" style="display: none;">
        </div>
    </section>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>

</html>
